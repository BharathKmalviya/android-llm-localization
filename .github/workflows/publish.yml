name: Release & Publish

on:
  push:
    branches:
      - master

jobs:
  release:
    name: Auto-tag, build, and publish if version changed
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # to create git tags
      id-token: write   # for PyPI trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to check existing tags

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if this version is already released
        id: tag_check
        run: |
          if git tag | grep -q "^v${{ steps.version.outputs.version }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version detected — will build and publish."
          fi

      - name: Set up Python
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        if: steps.tag_check.outputs.exists == 'false'
        run: pip install build

      - name: Build package
        if: steps.tag_check.outputs.exists == 'false'
        run: python -m build

      - name: Create Git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Publish to PyPI
        if: steps.tag_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG.md
          files: dist/*
